<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SyncOrSwim Shared Sensors</title>
    <link rel="stylesheet" href="/static/ui.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
  </head>
  <body>
    <main>
      <header class="page-header">
        <div>
          <h1 class="brand-title">SyncOrSwim</h1>
        </div>
        <div class="header-actions">
          <button
            id="share-access"
            class="secondary-button"
            type="button"
            hx-get="/ui/share-qr-fragment"
            hx-include="#installation-id"
            hx-target="#share-dialog-content"
            hx-swap="innerHTML"
            hidden
          >
            Share access
          </button>
          <button id="clear-access" class="secondary-button" type="button" hidden>
            Clear saved access
          </button>
        </div>
      </header>

      <p id="access-summary" class="access-summary" hidden></p>

      <form
        id="sensor-form"
        class="access-form"
        hx-get="/ui/sensors/latest-fragment"
        hx-target="#sensors-panel"
        hx-swap="innerHTML"
        hx-disabled-elt="#refresh"
      >
        <label>
          Installation ID
          <input
            id="installation-id"
            name="installation_id"
            autocomplete="username"
            required
            pattern="[a-z0-9-]{1,64}"
          >
        </label>
        <label>
          Web UI token
          <input id="web-token" type="password" autocomplete="current-password" required>
        </label>
        <button id="refresh" type="submit">Refresh</button>
      </form>

      <div id="pool-status-panel"></div>

      <div id="sensors-panel">
        <p class="status">Enter an installation ID and token to load sensors.</p>
        <table>
          <thead>
            <tr>
              <th>Sensor</th>
              <th>Value</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="3">Enter an installation ID and token to load sensors.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <dialog id="share-dialog" aria-labelledby="share-dialog-title">
        <div id="share-dialog-content">
          <p id="share-dialog-title" class="status">Loading...</p>
        </div>
      </dialog>
    </main>

    <script>
      const form = document.querySelector("#sensor-form");
      const installationInput = document.querySelector("#installation-id");
      const tokenInput = document.querySelector("#web-token");
      const poolStatusPanel = document.querySelector("#pool-status-panel");
      const sensorsPanel = document.querySelector("#sensors-panel");
      const accessSummary = document.querySelector("#access-summary");
      const clearAccessButton = document.querySelector("#clear-access");
      const shareAccessButton = document.querySelector("#share-access");
      const shareDialog = document.querySelector("#share-dialog");
      const shareDialogContent = document.querySelector("#share-dialog-content");
      const params = new URLSearchParams(window.location.search);
      const incomingInstallationId = params.get("installation_id") || "";
      const incomingWebToken = params.get("web_token") || "";

      installationInput.value =
        incomingInstallationId ||
        localStorage.getItem("syncorswim.installationId") ||
        "";
      tokenInput.value =
        incomingWebToken || localStorage.getItem("syncorswim.webToken") || "";

      function persistIncomingAccessFromUrl() {
        if (!incomingInstallationId || !incomingWebToken) {
          return;
        }

        storeFormValues();
        const cleanUrl = new URL(window.location.href);
        cleanUrl.searchParams.delete("web_token");
        window.history.replaceState({}, "", cleanUrl);
      }

      function storeFormValues() {
        localStorage.setItem(
          "syncorswim.installationId",
          installationInput.value.trim(),
        );
        localStorage.setItem("syncorswim.webToken", tokenInput.value.trim());
      }

      function hasSavedAccess() {
        return Boolean(installationInput.value.trim() && tokenInput.value.trim());
      }

      function updateAccessView() {
        const hasAccess = hasSavedAccess();
        form.hidden = hasAccess;
        accessSummary.hidden = true;
        clearAccessButton.hidden = !hasAccess;
        shareAccessButton.hidden = !hasAccess;
        accessSummary.textContent = "";
      }

      form.addEventListener("submit", () => {
        storeFormValues();
        updateAccessView();
        loadPoolStatus();
      });

      clearAccessButton.addEventListener("click", () => {
        localStorage.removeItem("syncorswim.installationId");
        localStorage.removeItem("syncorswim.webToken");
        installationInput.value = "";
        tokenInput.value = "";
        accessSummary.textContent = "";
        if (shareDialog.open) {
          shareDialog.close();
        }
        poolStatusPanel.innerHTML = "";
        sensorsPanel.innerHTML =
          '<p class="status">Enter an installation ID and token to load sensors.</p><table><tbody><tr><td>Enter an installation ID and token to load sensors.</td></tr></tbody></table>';
        updateAccessView();
        installationInput.focus();
      });

      document.body.addEventListener("htmx:configRequest", (event) => {
        event.detail.headers.Authorization = `Bearer ${tokenInput.value.trim()}`;
      });

      document.body.addEventListener("htmx:beforeRequest", (event) => {
        if (event.detail.elt === shareAccessButton) {
          shareDialogContent.innerHTML = '<p class="status">Loading...</p>';
          shareDialog.showModal();
          return;
        }

        if (event.detail.target === poolStatusPanel) {
          poolStatusPanel.innerHTML = '<p class="status">Loading...</p>';
          return;
        }

        if (event.detail.target !== sensorsPanel) {
          return;
        }

        sensorsPanel.innerHTML =
          '<p class="status">Loading...</p><table><tbody><tr><td>Loading...</td></tr></tbody></table>';
      });

      document.body.addEventListener("htmx:responseError", (event) => {
        if (event.detail.target === shareDialogContent) {
          shareDialogContent.innerHTML =
            '<p class="status error">Could not load QR code.</p><form method="dialog"><button class="secondary-button" type="submit">Close</button></form>';
          return;
        }

        if (event.detail.target === poolStatusPanel) {
          const message =
            event.detail.xhr.status === 401
              ? "Unauthorized. Check the web UI token."
              : "Could not load pool status.";
          poolStatusPanel.innerHTML = `<p class="status error">${message}</p>`;
          return;
        }

        if (event.detail.target !== sensorsPanel) {
          return;
        }

        const message =
          event.detail.xhr.status === 401
            ? "Unauthorized. Check the web UI token."
            : "Could not load shared sensors.";
        sensorsPanel.innerHTML = `<p class="status error">${message}</p>`;
      });

      function localizeTimestamps() {
        document.querySelectorAll("time[datetime]").forEach((time) => {
          const date = new Date(time.dateTime);
          if (Number.isNaN(date.getTime())) {
            return;
          }

          time.textContent = new Intl.DateTimeFormat(undefined, {
            dateStyle: "medium",
            timeStyle: "short",
          }).format(date);
          time.title = time.dateTime;
        });
      }

      document.body.addEventListener("htmx:afterSwap", (event) => {
        if (
          event.detail.target === sensorsPanel ||
          event.detail.target === poolStatusPanel
        ) {
          localizeTimestamps();
        }
      });

      function loadPoolStatus() {
        if (!installationInput.value.trim() || !tokenInput.value.trim()) {
          return;
        }

        htmx.ajax(
          "GET",
          `/ui/pool-status/latest-fragment?installation_id=${encodeURIComponent(installationInput.value.trim())}`,
          {
            target: "#pool-status-panel",
            swap: "innerHTML",
            headers: { Authorization: `Bearer ${tokenInput.value.trim()}` },
          },
        );
      }

      function loadSavedData() {
        if (!installationInput.value.trim() || !tokenInput.value.trim()) {
          return;
        }

        storeFormValues();
        updateAccessView();
        loadPoolStatus();
        htmx.ajax(
          "GET",
          `/ui/sensors/latest-fragment?installation_id=${encodeURIComponent(installationInput.value.trim())}`,
          {
            target: "#sensors-panel",
            swap: "innerHTML",
            headers: { Authorization: `Bearer ${tokenInput.value.trim()}` },
          },
        );
      }

      document.addEventListener("DOMContentLoaded", () => {
        persistIncomingAccessFromUrl();
        updateAccessView();
        window.setTimeout(loadSavedData, 0);
      });
    </script>
  </body>
</html>
