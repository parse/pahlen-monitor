name: Validate

on: [push, pull_request]

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check custom_components scripts"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check custom_components scripts"

  lint-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  contract-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
        working-directory: backend

      - run: npm run generate:openapi
        working-directory: backend

      - run: python3 scripts/generate_python_contract.py
      - run: python3 scripts/check_openapi_contract.py
      - run: git diff --exit-code -- backend/openapi.json custom_components/pahlen_monitor/generated_api.py
