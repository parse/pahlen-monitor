name: Validate

on: [push, pull_request]

permissions:
  contents: read

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: check custom_components backend scripts
      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check custom_components backend scripts

  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read Python version
        id: python-version
        run: echo "version=$(awk '$1 == \"python\" { print $2 }' .tool-versions)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python-version.outputs.version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Mypy
        run: python -m mypy backend/src custom_components/pahlen_monitor
      - name: Generated API types
        run: python scripts/generate_api_types.py --check
      - name: Pytest
        run: python -m pytest
